name: tanimonitor
description: Aplikasi monitoring lahan dan tanaman berbasis Flutter
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.2.3
  intl: ^0.19.0
  fl_chart: ^0.68.0
  file_picker: ^8.1.2
  timezone: ^0.9.4
  workmanager: ^0.9.0+3
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/foto_profil.jpg
